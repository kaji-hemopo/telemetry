<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Makoto Arbitrage Dashboard</title>
  <style>
    :root { --bg:#0b1220; --card:#121a2b; --txt:#e8eefc; --muted:#9cb0d8; --accent:#4cc9f0; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--txt); }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
    .head { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
    .card { background:var(--card); border:1px solid #23314f; border-radius:12px; padding:16px; }
    h1 { margin:0 0 8px 0; }
    .muted { color:var(--muted); margin:0; }
    button { background:var(--accent); border:0; color:#002a3a; padding:10px 14px; border-radius:10px; font-weight:700; cursor:pointer; }
    #content { margin-top:16px; overflow-x:auto; }
    a { color:#7dd3fc; }
    table { border-collapse: collapse; width:100%; }
    th, td { border:1px solid #29406e; padding:8px; vertical-align: top; text-align:left; }
    code { background:#1a2740; padding:2px 4px; border-radius:4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head card">
      <div>
        <h1>Makoto — Global Digital Arbitrage Scout</h1>
        <p class="muted">Live view of <code>workspace_makoto/outputs/arbitrage_intel.md</code></p>
        <p class="muted" style="margin-top:8px;">
          <a href="lancers_opportunities.html" style="color:#4cc9f0; font-weight:600;">⚡ Lancers Live Board</a> — actionable jobs with tech stack + strategy
          &nbsp;|&nbsp;
          <a href="https://kaji-hemopo.github.io/telemetry/empire-home.html" style="color:#888;">🏠 Empire Home</a>
        </p>
      </div>
      <button id="reloadBtn">Reload Intel</button>
    </div>
    <div id="content" class="card">Loading report...</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    async function loadIntel() {
      const target = document.getElementById("content");
      try {
        const res = await fetch("../outputs/arbitrage_intel.md?ts=" + Date.now());
        if (!res.ok) throw new Error("Report not found yet.");
        const md = await res.text();
        target.innerHTML = marked.parse(md);
      } catch (e) {
        target.innerHTML = "<p>No intel report yet. Run <code>python3 workspace_makoto/global_scout.py</code> first.</p>";
      }
    }
    document.getElementById("reloadBtn").addEventListener("click", loadIntel);
    loadIntel();
  </script>
</body>
</html>
