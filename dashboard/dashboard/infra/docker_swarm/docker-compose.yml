version: '3.8'

services:
  # LiteLLM Proxy for API key management and model routing
  litellm-proxy:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-proxy-swarm
    ports:
      - "4000:4000"
    volumes:
      - ../Tier1_Scripts/litellm_config.yaml:/app/config.yaml
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    command: --config /app/config.yaml --port 4000
    networks:
      - swarm-network
    restart: unless-stopped

  # Scout Agent - Business idea generation
  scout:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: swarm-scout
    environment:
      - AGENT_TYPE=scout
      - LLM_API_BASE=http://litellm-proxy:4000
      - LLM_API_KEY=${LITELLM_API_KEY:-sk-litellm-your-secret-key}
      - OPENCLAW_SANDBOX=true
    networks:
      - swarm-network
    depends_on:
      - litellm-proxy
    restart: "no"

  # Quant Agent - Risk/reward scoring
  quant:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: swarm-quant
    environment:
      - AGENT_TYPE=quant
      - LLM_API_BASE=http://litellm-proxy:4000
      - LLM_API_KEY=${LITELLM_API_KEY:-sk-litellm-your-secret-key}
      - OPENCLAW_SANDBOX=true
    networks:
      - swarm-network
    depends_on:
      - litellm-proxy
    restart: "no"

  # Auditor Agent - BS filtering
  auditor:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: swarm-auditor
    environment:
      - AGENT_TYPE=auditor
      - LLM_API_BASE=http://litellm-proxy:4000
      - LLM_API_KEY=${LITELLM_API_KEY:-sk-litellm-your-secret-key}
      - OPENCLAW_SANDBOX=true
    networks:
      - swarm-network
    depends_on:
      - litellm-proxy
    restart: "no"

  # Spy Agent - Competitor analysis
  spy:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: swarm-spy
    environment:
      - AGENT_TYPE=spy
      - LLM_API_BASE=http://litellm-proxy:4000
      - LLM_API_KEY=${LITELLM_API_KEY:-sk-litellm-your-secret-key}
      - OPENCLAW_SANDBOX=true
    networks:
      - swarm-network
    depends_on:
      - litellm-proxy
    restart: "no"

  # Tactician Agent - Execution planning
  tactician:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: swarm-tactician
    environment:
      - AGENT_TYPE=tactician
      - LLM_API_BASE=http://litellm-proxy:4000
      - LLM_API_KEY=${LITELLM_API_KEY:-sk-litellm-your-secret-key}
      - OPENCLAW_SANDBOX=true
    networks:
      - swarm-network
    depends_on:
      - litellm-proxy
    restart: "no"

networks:
  swarm-network:
    driver: bridge
    name: swarm-network